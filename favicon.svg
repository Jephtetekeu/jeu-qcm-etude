<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fond arrondi -->
  <rect width="32" height="32" rx="7" fill="#4f46e5"/>

  <!-- Toque de diplômé -->
  <!-- Base plate (bord du chapeau) -->
